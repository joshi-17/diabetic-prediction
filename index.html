<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Care</title>
    <style>
        /* Your inline or internal CSS styles */
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Health Care</h1>
            <nav>
                <a href="#">Understanding Diabetes Types</a>
                <a href="#">Symptoms</a>
                <a href="#">Managing Diabetes</a>
            </nav>
        </header>
        <main>
            <section class="form-container">
                <h2>Diabetes Checking: Essential Tests and Guidelines for Your Health</h2>
                <!-- Form submits data to the Flask '/predict' route using POST -->
                <form action="/predict" method="post">
                    <label for="Pregnancies">Pregnancies:</label>
                    <input type="number" id="Pregnancies" name="Pregnancies" step="1">

                    <label for="Glucose">Glucose:</label>
                    <input type="number" id="Glucose" name="Glucose" step="0.001">

                    <label for="BloodPressure">Blood Pressure:</label>
                    <input type="number" id="BloodPressure" name="BloodPressure" step="0.001">

                    <label for="SkinThickness">Skin Thickness:</label>
                    <input type="number" id="SkinThickness" name="SkinThickness" step="0.001">

                    <label for="Insulin">Insulin:</label>
                    <input type="number" id="Insulin" name="Insulin" step="0.001">

                    <label for="BMI">BMI:</label>
                    <input type="number" id="BMI" name="BMI" step="0.001">

                    <label for="DiabetesPedigreeFunction">Diabetes Pedigree Function:</label>
                    <input type="number" id="DiabetesPedigreeFunction" name="DiabetesPedigreeFunction" step="0.001">

                    <label for="Age">Age:</label>
                    <input type="number" id="Age" name="Age" step="1">

                    <button type="submit">Predict</button>
                </form>

                <!-- Display the prediction result if available -->
                {% if prediction %}
                    <h2>Prediction: {{ prediction }}</h2>
                {% endif %}
            </section>
        </main>
        <footer>
            <p>&copy; 2005 Diabetes Diagnosis — @codebrothers</p>
        </footer>
    </div>
</body>
</html>
